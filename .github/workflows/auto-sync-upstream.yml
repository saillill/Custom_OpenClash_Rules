name: Auto Sync Upstream

on:
  schedule:
    # 每天北京时间凌晨4点运行
    - cron: '0 20 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: "Sync from upstream"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Aethersailor/Custom_OpenClash_Rules.git
          git fetch upstream main

      - name: Check for updates
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "commits_behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Found $BEHIND new commits from upstream"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Merge upstream
        if: steps.check.outputs.has_updates == 'true'
        id: merge
        continue-on-error: true
        run: |
          git merge upstream/main --no-edit
          echo "merge_success=true" >> $GITHUB_OUTPUT

      - name: Push to origin
        if: steps.merge.outputs.merge_success == 'true'
        run: |
          git push origin main

      - name: Create conflict issue
        if: steps.check.outputs.has_updates == 'true' && steps.merge.outputs.merge_success != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['upstream-sync-conflict'],
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ 上游同步冲突 - 需要手动处理',
                body: `上游 Aethersailor/Custom_OpenClash_Rules 有新的更新，但自动合并时发生冲突。

### 手动处理步骤：
1. 在本地拉取最新代码：\`git pull origin main\`
2. 合并上游：\`git fetch upstream && git merge upstream/main\`
3. 解决冲突文件
4. 推送：\`git push origin main\`

> 🤖 此 Issue 由 Auto Sync Upstream Action 自动创建`,
                labels: ['upstream-sync-conflict'],
              });
            }
